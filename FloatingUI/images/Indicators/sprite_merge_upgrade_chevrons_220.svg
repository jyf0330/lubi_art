<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220" fill="none">
  <defs>
    <linearGradient id="ice" x1="110" y1="18" x2="110" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3FDFF" stop-opacity="0.86"/>
      <stop offset="0.45" stop-color="#9EDFFF" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#64BDEB" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="rim" x1="36" y1="20" x2="184" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#9BE7FF" stop-opacity="0.74"/>
    </linearGradient>
    <filter id="glow" x="10" y="0" width="200" height="220" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feFlood flood-color="#70D8FF" flood-opacity="0.62"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Two separate upward chevrons matching the supplied silhouette. -->
  <g filter="url(#glow)" stroke="url(#rim)" stroke-width="3.5" stroke-linejoin="round">
    <path d="M110 18 L188 112 L151 112 L110 63 L69 112 L32 112 Z" fill="url(#ice)"/>
    <path d="M110 108 L188 202 L151 202 L110 153 L69 202 L32 202 Z" fill="url(#ice)"/>
  </g>

  <g stroke="#FFFFFF" stroke-opacity="0.36" stroke-width="1.2" stroke-linejoin="round">
    <path d="M110 26 L174 104 L154 104 L110 53 L66 104"/>
    <path d="M110 116 L174 194 L154 194 L110 143 L66 194"/>
  </g>
</svg>
